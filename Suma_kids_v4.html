
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafío Mágico ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffebf2;
            --main-color: #ff85a2;
            --accent-color: #b39ddb;
            --scene-bg: #e1f5fe;
            --text-color: #5d4037;
            --btn-shadow: #e6738f;
        }

        .theme-guerrero {
            --bg-color: #e0f2f1;
            --main-color: #26a69a;
            --accent-color: #5c6bc0;
            --scene-bg: #f1f8e9;
            --text-color: #263238;
            --btn-shadow: #00897b;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px; /* MODIFICACIÓN: Padding en el body para que no pegue a bordes del móvil */
            box-sizing: border-box;
            transition: background-color 0.5s ease;
        }

        #app {
            background: white;
            padding: 30px; /* MODIFICACIÓN: Más padding interno en la caja principal */
            border-radius: 35px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
            position: relative;
            border: 4px solid var(--accent-color);
            text-align: center;
            box-sizing: border-box;
        }

        .hidden { display: none; }

        h1 { color: var(--main-color); margin-bottom: 10px; font-size: 1.8rem; }

        .avatar-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }

        .avatar-option {
            cursor: pointer;
            padding: 12px;
            border: 3px solid #eee;
            border-radius: 20px;
            transition: all 0.3s;
            flex: 1;
            background: #fafafa;
        }

        .avatar-option.selected {
            border-color: var(--main-color);
            background: var(--bg-color);
            transform: scale(1.05);
        }

        .avatar-option div { font-size: 2.2rem; }
        .avatar-option span { display: block; font-size: 0.85rem; font-weight: bold; margin-top: 5px; }

        .config-group { margin: 15px 0; text-align: left; }
        .config-group label { font-size: 0.9rem; font-weight: 600; margin-left: 5px; }

        input[type="text"], input[type="number"] {
            padding: 12px;
            border-radius: 12px;
            border: 2px solid #ddd;
            font-family: 'Quicksand';
            font-size: 1rem;
            width: 100%;
            box-sizing: border-box;
            margin-top: 5px;
        }

        .game-scene {
            background: var(--scene-bg);
            height: 90px;
            border-radius: 20px;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
            border: 2px solid rgba(0,0,0,0.05);
        }

        .character {
            position: absolute;
            bottom: 15px;
            font-size: 2.2rem;
            transition: left 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), right 0.6s ease;
        }

        #hero { left: 10px; z-index: 2; }
        #target { right: 10px; }
        #danger { right: -60px; bottom: 20px; font-size: 2rem; }

        .suma-box {
            display: inline-block;
            font-size: 3.2rem;
            text-align: right;
            margin: 10px 0;
            position: relative;
            font-weight: 700;
            color: var(--accent-color);
            letter-spacing: 10px;
        }

        .linea {
            border-bottom: 6px solid var(--main-color);
            border-radius: 10px;
            margin: 5px 0 15px 0;
        }

        .inputs-row {
            display: flex;
            flex-direction: row-reverse;
            justify-content: center;
            gap: 10px;
        }

        /* MODIFICACIÓN: Digit inputs mejorados para navegación manual */
        .digit {
            width: 55px;
            height: 70px;
            font-size: 2.2rem;
            text-align: center;
            border: 3px solid #f0f0f0;
            border-radius: 15px;
            color: var(--main-color);
            background: #fff;
            transition: border-color 0.2s;
            font-family: 'Quicksand';
        }

        .digit:focus {
            border-color: var(--main-color);
            outline: none;
            background: #fffafa;
        }

        /* Quitar flechas de input number */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button {
            -webkit-appearance: none; margin: 0;
        }

        .btn {
            background: var(--main-color);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 5px 0 var(--btn-shadow);
            margin-top: 20px;
            transition: all 0.1s;
        }

        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--btn-shadow); }

        .progress-container {
            height: 14px;
            background: #f0f0f0;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        #progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-color), var(--main-color));
            width: 0%;
            border-radius: 10px;
            transition: width 0.5s;
        }

        #feedback { height: 26px; font-weight: 700; margin: 15px 0; min-height: 26px; }
    </style>
</head>
<body>

<div id="app">
    <!-- VISTA INICIAL -->
    <div id="view-login">
        <h1 id="welcome-title">✨ ¡Bienvenido!</h1>
        <p style="margin-bottom: 25px;">Configura tu aventura:</p>
        
        <div class="avatar-selector">
            <div class="avatar-option selected" id="opt-princesa" onclick="selectAvatar('princesa')">
                <div>👸</div><span>Princesa</span>
            </div>
            <div class="avatar-option" id="opt-guerrero" onclick="selectAvatar('guerrero')">
                <div>⚔️</div><span>Guerrero</span>
            </div>
        </div>

        <div class="config-group">
            <label>¿Cómo te llamas?</label>
            <input type="text" id="player-name" placeholder="Escribe aquí...">
        </div>
        
        <div class="config-group">
            <label>¿Cuántas sumas quieres resolver?</label>
            <input type="number" id="total-sums" value="10" min="1">
        </div>

        <button class="btn" onclick="start()">¡Empezar Aventura! 🚀</button>
    </div>

    <!-- VISTA JUEGO -->
    <div id="view-game" class="hidden">
        <div class="progress-container"><div id="progress-bar"></div></div>
        <div style="display: flex; justify-content: space-between; font-size: 0.85rem; font-weight: bold; margin-bottom: 15px;">
            <span id="label-name"></span>
            <span>Reto <span id="current-step">1</span>/<span id="label-total">10</span></span>
        </div>

        <div class="game-scene">
            <div id="hero" class="character">👸</div>
            <div id="danger" class="character">☁️</div>
            <div id="target" class="character">💎</div>
        </div>

        <div class="suma-box">
            <div id="val1">000</div>
            <div id="val2">000</div>
            <div style="position: absolute; left: -40px; bottom: 85px; color: var(--main-color);">+</div>
            <div class="linea"></div>
            <div class="inputs-row">
                <!-- MODIFICACIÓN: Manejo de teclado con Enter y navegación -->
                <input type="number" class="digit" id="d-u" data-next="d-d" placeholder="u">
                <input type="number" class="digit" id="d-d" data-next="d-c" data-prev="d-u" placeholder="d">
                <input type="number" class="digit" id="d-c" data-next="d-m" data-prev="d-d" placeholder="c">
                <input type="number" class="digit" id="d-m" data-prev="d-c" placeholder="m">
            </div>
        </div>

        <div id="feedback"></div>
        <button class="btn" onclick="check()">Comprobar Resultado</button>
    </div>

    <!-- VISTA VICTORIA -->
    <div id="view-win" class="hidden">
        <h1 id="win-title">💖 ¡ERES GENIAL!</h1>
        <p id="final-msg" style="font-size: 1.1rem; line-height: 1.4;"></p>
        <div id="win-icon" style="font-size: 5rem; margin: 20px 0;">👑</div>
        <button class="btn" onclick="location.reload()">Jugar de nuevo</button>
    </div>
</div>

<script>
    let playerName = "";
    let selectedType = "princesa";
    let level = 1;
    let maxLevels = 10;
    let targetSum = 0;
    let mistakes = 0;

    // Configuración de navegación de teclado
    document.querySelectorAll('.digit').forEach(input => {
        // Al escribir, saltar automáticamente
        input.addEventListener('input', function() {
            if (this.value.length >= 1) {
                this.value = this.value.slice(0, 1);
                const nextId = this.getAttribute('data-next');
                if (nextId) document.getElementById(nextId).focus();
            }
        });

        // Manejo de Enter y flechas/borrar
        input.addEventListener('keydown', function(e) {
            if (e.key === "Enter") {
                check();
            } else if (e.key === "Backspace" && this.value === "") {
                const prevId = this.getAttribute('data-prev');
                if (prevId) document.getElementById(prevId).focus();
            }
        });
    });

    function selectAvatar(type) {
        selectedType = type;
        document.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('selected'));
        if(type === 'princesa') {
            document.getElementById('opt-princesa').classList.add('selected');
            document.body.classList.remove('theme-guerrero');
            document.getElementById('welcome-title').innerText = "✨ ¡Hola Linda!";
        } else {
            document.getElementById('opt-guerrero').classList.add('selected');
            document.body.classList.add('theme-guerrero');
            document.getElementById('welcome-title').innerText = "⚔️ ¡Hola Guerrero!";
        }
    }

    function start() {
        playerName = document.getElementById('player-name').value;
        maxLevels = parseInt(document.getElementById('total-sums').value) || 10;
        
        if(!playerName) { alert("Por favor, escribe tu nombre"); return; }

        const heroEl = document.getElementById('hero');
        const targetEl = document.getElementById('target');
        if(selectedType === 'princesa') {
            heroEl.innerText = "👸";
            targetEl.innerText = "💎";
            document.getElementById('label-name').innerText = "Princesa " + playerName;
        } else {
            heroEl.innerText = "⚔️";
            targetEl.innerText = "🐉";
            document.getElementById('label-name').innerText = "Guerrero " + playerName;
        }

        document.getElementById('label-total').innerText = maxLevels;
        document.getElementById('view-login').classList.add('hidden');
        document.getElementById('view-game').classList.remove('hidden');
        newSum();
    }

    function newSum() {
        const n1 = Math.floor(Math.random() * 850) + 100;
        const n2 = Math.floor(Math.random() * 850) + 100;
        targetSum = n1 + n2;
        mistakes = 0;

        document.getElementById('val1').innerText = n1;
        document.getElementById('val2').innerText = n2;
        document.getElementById('danger').style.right = "-60px";
        
        ['d-u','d-d','d-c','d-m'].forEach(id => {
            document.getElementById(id).value = "";
        });
        document.getElementById('feedback').innerText = "¡Tú puedes!";
        document.getElementById('feedback').style.color = "var(--text-color)";
        document.getElementById('d-u').focus();
    }

    function check() {
        const u = document.getElementById('d-u').value || "0";
        const d = document.getElementById('d-d').value || "0";
        const c = document.getElementById('d-c').value || "0";
        const m = document.getElementById('d-m').value || "0";
        
        const userVal = parseInt(m + d + c + u); // Nota: m es miles, c centenas...
        // Corregimos la lógica del valor: m*1000 + c*100 + d*10 + u
        const realUserVal = parseInt(m)*1000 + parseInt(c)*100 + parseInt(d)*10 + parseInt(u);

        const fb = document.getElementById('feedback');

        if(realUserVal === targetSum) {
            fb.innerText = "¡Excelente! 🌟";
            fb.style.color = "#4caf50";
            
            setTimeout(() => {
                level++;
                if(level > maxLevels) {
                    win();
                } else {
                    document.getElementById('current-step').innerText = level;
                    document.getElementById('progress-bar').style.width = ((level-1)/maxLevels*100) + "%";
                    document.getElementById('hero').style.left = ((level-1)/maxLevels*75) + "%";
                    newSum();
                }
            }, 1000);
        } else {
            mistakes++;
            fb.innerText = "¡Casi! Intenta de nuevo ⚡";
            fb.style.color = "#f44336";
            let moveDanger = mistakes * 60; 
            document.getElementById('danger').style.right = moveDanger + "px";

            if(mistakes >= 4) {
                fb.innerText = "¡Cuidado! Vamos con otra.";
                setTimeout(newSum, 1500);
            }
        }
    }

    function win() {
        document.getElementById('progress-bar').style.width = "100%";
        document.getElementById('hero').style.left = "80%";
        
        setTimeout(() => {
            document.getElementById('view-game').classList.add('hidden');
            document.getElementById('view-win').classList.remove('hidden');
            
            if(selectedType === 'princesa') {
                document.getElementById('win-title').innerText = "💖 ¡ERES GENIAL!";
                document.getElementById('win-icon').innerText = "👑";
                document.getElementById('final-msg').innerText = "¡Lo lograste " + playerName + "! Eres una experta en matemáticas.";
            } else {
                document.getElementById('win-title').innerText = "🏆 ¡VICTORIA!";
                document.getElementById('win-icon').innerText = "🛡️";
                document.getElementById('final-msg').innerText = "¡Misión cumplida, " + playerName + "! Has derrotado todos los problemas.";
            }
        }, 600);
    }
</script>

</body>
</html>
